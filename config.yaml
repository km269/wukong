# =============================================================================
# Wukong Configuration — 全功能配置模板
# =============================================================================
# 版本: v0.9.0 | Go: 1.26 | 配置段: 30+
#
# 加载优先级（从高到低）:
#   1. 命令行参数 (--provider, --model, --temperature, --max-tokens, --config)
#   2. 环境变量 (WUKONG_ 前缀, 如 WUKONG_DEFAULT_PROVIDER)
#   3. --config CLI 指定的文件
#   4. 当前目录 ./config.yaml
#   5. ~/.config/wukong/config.yaml
#   6. /etc/wukong/config.yaml (仅限非 Windows 平台)
#   7. 内置默认值
#
# 环境变量引用语法: ${ENV_VAR} (运行时自动展开)
# =============================================================================

# 日志级别: debug | info | warn | error
# CLI --debug 覆盖为 debug, --quiet 覆盖为 error
log_level: "info"

# 默认 AI 提供商名称 (必须与 providers 列表中某个 name 匹配)
default_provider: "lmstudio"

# =============================================================================
# 全局轻量模型 — 后台任务共享的廉价/快速模型
# =============================================================================
# 当各子系统未显式指定模型时，统一回退到此配置:
#   memory.extractor_model      → lightweight_model
#   memoryflow.planner_model    → lightweight_model
#   memoryflow.extractor_model  → lightweight_model
#   graphflow.extractor_model   → lightweight_model
#   revision.revision_model     → lightweight_model
lightweight_provider: "lmstudio"
lightweight_model: "gemma-4-e4b-it"

# =============================================================================
# 1. Providers — AI 模型提供商
# =============================================================================
# 支持类型: openai | anthropic | google | deepseek | ollama | lmstudio | acp
# api_key 支持 ${ENV_VAR} 语法引用环境变量
providers:
  - name: "openai"
    type: "openai"
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o"

  - name: "deepseek"
    type: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"

  - name: "anthropic"
    type: "anthropic"
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
    model: "claude-sonnet-4-20250514"

  - name: "ollama"
    type: "ollama"
    api_key: "ollama"
    base_url: "http://localhost:11434/v1"
    model: "llama3"

  - name: "lmstudio"
    type: "lmstudio"
    api_key: "lmstudio"
    base_url: "http://192.168.50.97:1234/v1"
    model: "google/gemma-4-26b-a4b"

  # ACP 代理客户端 — 将远程 ACP Agent 作为 LLM 提供商
  - name: "acp-coder"
    type: "acp"
    agent_url: "http://localhost:4000"
    model: "acp-default"

# =============================================================================
# 2. Agent — 核心行为与执行策略
# =============================================================================
agent:
  # --- 执行限制 ---
  max_llm_calls: 50
  max_tool_iterations: 30
  max_run_duration: "300s"
  parallel_tools: true
  streaming: true

  # --- 生成参数 ---
  temperature: 0.7
  max_tokens: 4096
  # reasoning_effort: "medium"  # low | medium | high (仅 builtin planner)

  # --- 工具重试 (指数退避) ---
  tool_retry_enabled: true
  tool_retry_max_attempts: 3
  tool_retry_initial_wait: "1s"
  tool_retry_backoff_factor: 2.0
  enable_post_tool_prompt: true

  # --- Planner 规划器 ---
  # builtin: 支持原生 thinking 的模型 (Claude/Gemini/OpenAI o-series)
  # react:   通过标签引导思考 (适合不支持原生 thinking 的模型)
  # "":      不启用 planner
  planner: ""

  # --- Tool Search 工具筛选 ---
  tool_search_enabled: true
  # tool_search_max_tools: 20   # 每次最多提供给 LLM 的工具数

  # --- Context Compaction 上下文压缩 (两遍) ---
  # Pass 1: 将旧的超大工具结果替换为占位符
  # Pass 2: 对剩余超大结果进行首尾截断
  context_compaction: true
  # context_compaction_tool_result_max_tokens: 1024
  # context_compaction_oversized_max_tokens: 8192
  # context_compaction_keep_recent: 1
  # context_compaction_force_clean_tools:
  #   - "shell"
  #   - "grep"
  # context_compaction_keep_tools:
  #   - "memory_search"
  #   - "session_search"

  # --- Session Recall 跨会话上下文预加载 ---
  session_recall_enabled: false
  # session_recall_limit: 5

  # --- JSON Repair — 修复 LLM 输出的非标准 JSON ---
  json_repair_enabled: false

  # --- Todo 任务管理 ---
  todo_tool_enabled: true
  todo_enforcer_enabled: true

  # --- Agent Tools — 子 Agent 包装为可调用工具 ---
  agent_tools_enabled: false
  # agent_tools_stream: true

  # --- 提示模板 ---
  system_prompt_dir: "~/.config/wukong/prompts/"

  # --- Recipe 配方子 Agent ---
  # recipe_dir: ".wukong/recipes/"
  # recipe_enabled: true

# =============================================================================
# 3. Security — 安全策略与权限控制
# =============================================================================
security:
  # 权限模式: auto | smart | manual | chat_only
  permission_mode: "smart"
  require_approval: false

  # 安全扫描
  malware_scan_enabled: true
  block_dangerous_commands: true
  blocked_commands:
    - "rm -rf /"
    - "dd if=/dev/zero"
    - "mkfs."
    - "> /dev/sda"
    - "fork bomb"

  # 超时
  default_timeout: "30s"
  max_timeout: "300s"

  # 黑白名单 (支持通配符, 如 "file_*")
  allowlist: []
  denylist: []

  # Guardrail — Prompt 注入检测 (启用增加延迟)
  guardrail_enabled: false

  # .wukongignore — gitignore 兼容的文件访问黑名单
  ignore_file_enabled: true
  ignore_file: ".wukongignore"

# =============================================================================
# 4. Session — 会话持久化
# =============================================================================
session:
  backend: "sqlite"             # sqlite | memory | redis
  db_path: "wukong.db"
  event_limit: 500
  ttl: "0h"                     # 0 = 永不过期
  enable_summary: true
  summary_trigger: 50
  # redis_url: "redis://localhost:6379/0"  # 仅 backend="redis" 时

# =============================================================================
# 5. Memory — 长期记忆 (tRPC Memory)
# =============================================================================
memory:
  backend: "sqlite"             # sqlite | memory
  db_path: "wukong.db"
  max_memories: 100             # 0 = 不限制

  # AutoExtract — 每轮对话后异步 LLM 提取事实
  auto_extract: true
  extract_timeout: "600s"
  extractor_provider: "lmstudio"    # 独立提取模型 provider
  # extractor_model: ""             # 留空 → 使用 lightweight_model

  # SmartCleanup — 容量感知淘汰 (80% 触发 → 60% 目标)
  # 评分策略: 70% recency + 30% content length
  enable_smart_cleanup: true
  cleanup_trigger_threshold: 0.8
  cleanup_target_threshold: 0.6
  memory_ttl: "720h"

  # 自定义记忆提取 Prompt
  extractor_prompt: |
    You are a Memory Manager. Extract concise memories from the conversation.
    Today's date is {current_date}. Resolve ALL relative time references to absolute dates.

    <rules>
    1. **Atomicity**: One fact per memory.
    2. **No subject prefix**: Never start with "User", "The user", etc.
    3. **Deduplication**: Check existing memories before adding.
    4. **Specificity**: Include names, dates, places, quantities.
    5. **Episode vs Fact**: Episode = events with time, Fact = stable attributes.
    6. **All speakers**: Extract info about EVERY person in the conversation.
    7. **Skip transient**: Do not create memories for greetings or trivial queries.
    </rules>

    Write memory content in the same language as the user's input.
    Call multiple tools in parallel for efficiency.

# =============================================================================
# 6. Todo — 任务追踪
# =============================================================================
todo:
  backend: "sqlite"
  db_path: "wukong.db"
  enable_native_todo: true
  enable_enforcer: true

# =============================================================================
# 7. Recall — 跨会话对话搜索 (FTS5 全文)
# =============================================================================
recall:
  enabled: true
  backend: "sqlite"
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  search_mode: "fts5"            # fts5 | hybrid (hybrid 需 Embedding)
  # embedding_provider: "openai"
  # embedding_model: "text-embedding-3-small"

# =============================================================================
# 8. Cortex — CortexDB 智能记忆栈
# =============================================================================
# HNSW 向量搜索 + FTS5 全文搜索 + 余弦相似度本地排序
# 启用后，recall 后台存储自动切换为 CortexDB
cortex:
  enabled: true
  db_path: "wukong.db"
  max_results: 10
  max_messages_per_session: 200
  embedding_base_url: "http://192.168.50.97:1234"
  embedding_api_key: "lmstudio"
  embedding_model: "qwen3-embedding-0.6b-graphql"

# =============================================================================
# 9. MemoryFlow — 转录记录与语义唤醒
# =============================================================================
# 三层上下文构建: 身份(who_am_i) + 回忆(recall) + 当前会话(current)
# 事实提升: IngestTurn → WakeUp → PromoteFacts → tRPC Memory
memoryflow:
  enabled: true
  db_path: "wukong.db"
  namespace: "assistant"
  embedding_dimensions: 0        # 0 = 自动检测
  # planner_model: ""            # 留空 → lightweight_model
  # extractor_model: ""          # 留空 → lightweight_model

# =============================================================================
# 10. GraphFlow — 知识图谱构建
# =============================================================================
# 每轮对话自动提取实体/关系 → RDF 图 → SPARQL 查询
graphflow:
  enabled: true
  db_path: "wukong.db"
  max_chars_per_doc: 8000
  auto_extract: true              # 每轮对话后自动提取
  # extractor_model: ""           # 留空 → lightweight_model

# =============================================================================
# 11. ImportFlow — 结构化数据导入
# =============================================================================
# DDL → KG 映射, CSV → RAG+KG
importflow:
  enabled: true
  db_path: "wukong.db"

# =============================================================================
# 12. Revision — 上下文窗口管理 (3层压缩)
# =============================================================================
# Layer 1: ContextCompaction (tRPC 插件)
# Layer 2: LLM 智能摘要 (辅助模型)
# Layer 3: 渐进式截断
revision:
  enabled: true
  revision_provider: "lmstudio"       # 辅助摘要模型 provider
  # revision_model: ""                # 留空 → lightweight_model
  enable_llm_summarize: true
  summary_cooldown: 120s
  summary_timeout: 30s
  max_command_output: 8000
  enable_semantic_search: false
  search_strategy: "include_all"
  max_context_tokens: 64000
  trim_ratio: 0.3

# =============================================================================
# 13. Browser — 浏览器自动化 (Chromedp)
# =============================================================================
browser:
  enabled: true
  browser_type: "chromium"
  headless: true
  cache_dir: ".wukong/cache"
  max_download_size: 104857600      # 100MB
  timeout: "60s"
  viewport_width: 1280
  viewport_height: 720
  search_backend: "duckduckgo"       # duckduckgo | searxng | tavily
  # search_backend_url: ""           # SearXNG 实例 URL
  # search_api_key: ""               # API Key (留空=使用 DuckDuckGo)

# =============================================================================
# 14. Visualiser — 图表生成
# =============================================================================
visualiser:
  enabled: true
  output_dir: ".wukong/visuals"
  max_width: 1200
  max_height: 800

# =============================================================================
# 15. Tutorial — 交互式教程
# =============================================================================
tutorial:
  enabled: true
  language: "zh"

# =============================================================================
# 16. Top of Mind — 持久化指令注入
# =============================================================================
# 指令文件内容注入每次对话的系统提示中
top_of_mind:
  enabled: true
  instruction_file: ".wukong/instructions.md"
  max_length: 2000

# =============================================================================
# 17. Code Mode — goja JavaScript 沙箱
# =============================================================================
# 5 层安全: API白名单 + 128MB限制 + 5并发 + ReDoS防护 + Panic恢复
code_mode:
  enabled: true
  timeout: "10s"
  max_memory_mb: 128

# =============================================================================
# 18. Apps — HTML 应用管理
# =============================================================================
apps:
  enabled: true
  app_dir: ".wukong/apps"

# =============================================================================
# 19. ARD — Agentic Resource Discovery
# =============================================================================
# AI Agent / MCP Server 资源发现、注册和目录管理
# 支持本地目录 + 远程注册表联邦搜索
ard:
  enabled: false                    # 默认关闭，按需启用
  registry_url: ""                  # 远程 ARD 注册表 URL
  catalog_path: ".wukong/ard/catalog.json"  # 本地目录文件路径

# =============================================================================
# 20. Summon — 子代理委派 + A2A 远程代理
# =============================================================================
summon:
  enabled: true
  skills_dir: ".wukong/skills"      # 统一技能目录 (与 skill 共用)
  max_concurrent: 5
  a2a_remotes: []
  # a2a_remotes 示例:
  #   - name: "code-reviewer"
  #     description: "Reviews code for quality and security"
  #     server_url: "http://localhost:8081"
  #     auth_type: "api_key"
  #     api_key: "${A2A_API_KEY}"

# =============================================================================
# 21. Skill — Agent Skill 仓库
# =============================================================================
skill:
  enabled: true
  skills_dir: ".wukong/skills"      # 统一技能目录 (与 summon 共用)
  auto_load: true
  max_skills: 20

# =============================================================================
# 22. Evolution — 技能自进化
# =============================================================================
# 闭环: Agent执行 → ExecutionTrace → LLM分析 → 补丁建议 → 版本管理 → 热重载
evolution:
  enabled: false                    # 实验性功能
  auto_patch: false                 # false=仅记录建议, true=自动应用
  analysis_provider: ""             # 空=使用 default_provider
  analysis_model: ""                # 空=使用 provider 默认模型
  min_confidence: 0.7               # 接受补丁的最低置信度 (0.0-1.0)
  cooldown_period: "30m"            # 同技能两次修补的最短间隔
  max_patches_per_day: 10           # 全局每日最大补丁数
  max_versions_kept: 10             # 保留的历史版本数
  max_patch_size: 8192              # 单个补丁最大字节数 (8KB)
  analysis_timeout: "60s"           # 分析超时

# =============================================================================
# 23. Knowledge — RAG 知识库
# =============================================================================
knowledge:
  enabled: false
  embedder_provider: "lmstudio"
  embedder_model: "qwen3-embedding-4b"
  # sources:                        # 本地文档源 (支持 txt, md, pdf, csv, json, docx)
  #   - "./docs"
  #   - "./README.md"
  # source_urls: []                 # URL 远程文档
  vector_store: "inmemory"          # inmemory
  max_results: 5
  enable_source_sync: false
  reranker_enabled: false
  search_tool_name: "knowledge_search"

# =============================================================================
# 24. Workflow — 多模式 Agent 编排
# =============================================================================
# 10 种模式: single | chain | parallel | cycle | graph |
#            team_coordinator | team_swarm | claude_code | codex | dify
workflow:
  mode: "single"
  max_iterations: 10
  cycle_mode: "default"            # default | code_review
  # Graph 高级特性
  stream_mode: "none"              # none | hub
  cache_enabled: false
  engine: "bsp"                    # bsp | dag
  sub_agents: []
  # team_members:                  # team_coordinator/team_swarm 模式
  #   - name: "researcher"
  #     instruction: "You are a research specialist..."
  #   - name: "coder"
  #     instruction: "You are a coding specialist..."
  #   - name: "reviewer"
  #     instruction: "You are a quality reviewer..."

# =============================================================================
# 25. Dify — Dify AI 平台集成
# =============================================================================
dify:
  enabled: false
  # base_url: "https://api.dify.ai/v1"
  # api_secret: "${DIFY_API_SECRET}"
  agent_name: "dify"
  enable_streaming: false
  timeout: "120s"

# =============================================================================
# 26. 服务端点 — 协议与端口
# =============================================================================

# A2A Server — Agent-to-Agent 标准通信 (tRPC-A2A-Go)
a2a_server:
  enabled: true
  address: ":9090"
  agent_name: "wukong"
  agent_description: "Wukong AI Agent - A2A service endpoint"

# AG-UI Server — Web UI SSE 实时对话
agui:
  enabled: true
  address: ":8080"
  path: "/agui"

# ACP Server — Agent Client Protocol
acp_server:
  enabled: true
  address: ":9091"
  path: "/acp"
  enable_streaming: true
  # auth_type: ""                  # api_key | jwt | ""
  # api_key: "${ACP_API_KEY}"

# ACP MCP Bridge — 跨协议工具桥接 (JSON-RPC 2.0 over HTTP)
acp_mcp:
  enabled: true
  address: ":3400"
  path: "/mcp"

# =============================================================================
# 27. Eval — 代理评估与回归测试
# =============================================================================
eval:
  enabled: false
  evalset_path: ".wukong/evals/default.evalset.json"
  results_path: ".wukong/evals/results.json"
  # metrics:
  #   - name: "tool_trajectory_match"
  #     threshold: 0.8
  #   - name: "response_not_empty"
  #     threshold: 1.0

# =============================================================================
# 28. Extensions — 外部 MCP 扩展配置
# =============================================================================
# 内置扩展自动注册，此处仅配置外部 MCP 扩展
extensions: []
  # - name: "external-mcp"
  #   type: "external"
  #   transport: "stdio"
  #   command: "node"
  #   args: ["server.js"]
  #   env:
  #     MY_VAR: "value"
  #   tool_include: ["tool_*"]
  #   tool_exclude: ["dangerous_*"]

# =============================================================================
# 29. Telemetry — OpenTelemetry 分布式追踪
# =============================================================================
telemetry:
  enabled: false
  exporter_type: "console"          # console | grpc | http
  endpoint: "localhost:4317"
  service_name: "wukong"
  service_version: "1.0.0"
  environment: "development"
  sample_rate: 1.0

# =============================================================================
# 30. Observability — Langfuse LLM 追踪
# =============================================================================
observability:
  langfuse_enabled: false
  # langfuse_host: ""
  # langfuse_public_key: ""
  # langfuse_secret_key: ""

# =============================================================================
# 31. Artifact — 制品存储
# =============================================================================
artifact:
  backend: "inmemory"               # inmemory | cos
  # cos_bucket_url: "https://bucket.cos.region.myqcloud.com"
  # cos_secret_id: "${COS_SECRETID}"
  # cos_secret_key: "${COS_SECRETKEY}"

# =============================================================================
# 32. Project — 项目工作目录追踪
# =============================================================================
project_dir: "~/.config/wukong/"
